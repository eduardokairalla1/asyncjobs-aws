AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Async Job Processing API

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    Environment:
      Variables:
        JOBS_TABLE: !Ref JobsTable
        JOBS_QUEUE_URL: !Ref JobsQueue
        RESULTS_BUCKET: !Ref ResultsBucket

Resources:

  # --- Lambdas ---
  JobWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.lambda_handler
      CodeUri: src/job_worker/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref JobsTable
        - S3CrudPolicy:
            BucketName: !Ref ResultsBucket
        - SQSPollerPolicy:
            QueueName: !GetAtt JobsQueue.QueueName
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt JobsQueue.Arn
            BatchSize: 1

  # --- DynamoDB ---
  JobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: job_id
          AttributeType: S
      KeySchema:
        - AttributeName: job_id
          KeyType: HASH

  # --- SQS ---
  JobsDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600

  JobsQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 60
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt JobsDeadLetterQueue.Arn
        maxReceiveCount: 3

  # --- S3 ---
  ResultsBucket:
    Type: AWS::S3::Bucket

Outputs:
  ApiUrl:
    Description: URL for the API endpoint
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
